<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SMC Trader - Smart Money Concepts Analyzer{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
            --accent: #66fcf1;
            --accent-hover: #45a29e;
            --border: #2d3436;
            --success: #00ff9d;
            --danger: #ff4b4b;
            --warning: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navbar */
        .navbar {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { font-size: 1.5rem; font-weight: 700; color: var(--accent); text-decoration: none; letter-spacing: 1px; }
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        /* Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .card-title { font-size: 1.25rem; font-weight: 600; color: var(--text-main); }

        /* Grids */
        .grid { display: grid; gap: 1.5rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .col-span-2 { grid-column: span 2; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: var(--accent); color: #000; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        .w-100 { width: 100%; }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
            font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--accent); }

        /* Tables */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; }
        tr:hover { background-color: rgba(255,255,255,0.02); }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-success { background-color: rgba(0, 255, 157, 0.15); color: var(--success); border: 1px solid var(--success); }
        .badge-danger { background-color: rgba(255, 75, 75, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .badge-warning { background-color: rgba(255, 215, 0, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .badge-info { background-color: rgba(102, 252, 241, 0.15); color: var(--accent); border: 1px solid var(--accent); }

        /* Signal Strength Colors */
        .signal-very-strong { border-left: 4px solid var(--success); }
        .signal-strong { border-left: 4px solid var(--accent); }
        .signal-moderate { border-left: 4px solid var(--warning); }
        .signal-weak { border-left: 4px solid var(--danger); }

        /* Utilities */
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--accent); }
        .text-right { text-align: right; }
        .mt-2 { margin-top: 0.5rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mt-3 { margin-top: 1rem; }
        .mb-3 { margin-bottom: 1rem; }
        .mb-4 { margin-bottom: 1.5rem; }
        .flex { display: flex; align-items: center; }
        .gap-2 { gap: 0.5rem; }
        .justify-between { justify-content: space-between; }
        .align-items-center { align-items: center; }
        .text-center { text-align: center; }
        .py-5 { padding-top: 3rem; padding-bottom: 3rem; }

        /* Loading Spinner */
        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Coin Card Specifics */
        .coin-card { cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .coin-card:hover { transform: translateY(-2px); border-color: var(--accent); }
        .coin-price { font-size: 1.5rem; font-weight: 700; }
        .coin-change { font-size: 0.9rem; font-weight: 600; }
        
        /* Confluence Tags */
        .confluence-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; }
        .tag { font-size: 0.7rem; padding: 0.2rem 0.5rem; background: rgba(255,255,255,0.1); border-radius: 3px; color: var(--text-muted); }
        
        .price-up { color: var(--success); }
        .price-down { color: var(--danger); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a class="brand" href="{{ url_for('index') }}">
            <i class="bi bi-graph-up-arrow"></i> SMC Trader
        </a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}"><i class="bi bi-house"></i> Home</a>
            <a href="{{ url_for('screener') }}" class="{% if request.endpoint == 'screener' %}active{% endif %}"><i class="bi bi-search"></i> Screener</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="background-color: var(--card-bg); border-top: 1px solid var(--border); padding: 2rem; margin-top: 3rem; text-align: center;">
        <p class="text-muted mb-0">
            <small>⚠️ Trading involves risk. This tool is for educational purposes only.</small>
        </p>
        <p class="text-muted mt-2">
            <small>&copy; 2024 SMC Trader. All rights reserved.</small>
        </p>
    </footer>

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
