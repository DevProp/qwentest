{% extends "base.html" %}

{% block title %}Error - {{ error }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <i class="bi bi-exclamation-triangle display-1 text-warning mb-4"></i>
        <h1 class="display-4 mb-3">Oops!</h1>
        <h3 class="mb-4">{{ error }}</h3>
        <p class="text-muted mb-4">
            Something went wrong. Please try again or return to the home page.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                <i class="bi bi-house"></i> Go Home
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
